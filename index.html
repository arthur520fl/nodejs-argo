<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_NEXUS // TERMINAL</title>
    <!-- 引入科幻风格的 Google 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff003c;
            --dark-bg: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-blue);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 模拟老式 CRT 显示器的扫描线效果 */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 243, 255, 0.08) 50%,
                rgba(0, 243, 255, 0.08)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
        }

        /* 背景发光网格 */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* 主体内容区 */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

        /* 故障（Glitch）风格标题 */
        .glitch-title {
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 2rem;
        }

        .glitch-title::before, .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
        }

        .glitch-title::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch-title::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-blue);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 85px, 0); }
            20% { clip: rect(92px, 9999px, 11px, 0); }
            40% { clip: rect(43px, 9999px, 56px, 0); }
            60% { clip: rect(12px, 9999px, 89px, 0); }
            80% { clip: rect(74px, 9999px, 14px, 0); }
            100% { clip: rect(33px, 9999px, 66px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(12px, 9999px, 65px, 0); }
            20% { clip: rect(82px, 9999px, 31px, 0); }
            40% { clip: rect(53px, 9999px, 96px, 0); }
            60% { clip: rect(22px, 9999px, 49px, 0); }
            80% { clip: rect(64px, 9999px, 24px, 0); }
            100% { clip: rect(13px, 9999px, 86px, 0); }
        }

        /* 终端面板 */
        .terminal {
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid var(--neon-blue);
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.2), 0 0 15px rgba(0, 243, 255, 0.3);
            padding: 20px;
            height: 200px;
            text-align: left;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .terminal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,243,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .terminal p {
            line-height: 1.5;
            font-size: 1.1rem;
        }

        /* 闪烁的光标 */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: var(--neon-blue);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 科幻按钮 */
        .cyber-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--neon-blue) inset, 0 0 10px var(--neon-blue);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .cyber-btn:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-blue) inset, 0 0 30px var(--neon-blue);
            text-shadow: none;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .glitch-title { font-size: 2.5rem; }
            .terminal { height: 250px; }
        }
    </style>
</head>
<body>
    <!-- 扫描线覆盖层 -->
    <div class="scanlines"></div>
    <!-- 3D 空间网格背景 -->
    <div class="grid-bg"></div>

    <div class="container">
        <!-- 故障标题 -->
        <div class="glitch-title" data-text="SYSTEM_ONLINE">SYSTEM_ONLINE</div>
        
        <!-- 终端面板 -->
        <div class="terminal">
            <p id="typewriter-text"></p>
            <span class="cursor"></span>
        </div>

        <!-- 交互按钮 -->
        <button class="cyber-btn" onclick="triggerAction()">INITIALIZE PROTOCOL</button>
    </div>

    <script>
        // 打字机效果脚本
        const terminalText = [
            "> Establishing secure connection...",
            "> Bypassing ICE firewalls...",
            "> Decrypting mainframe coordinates...",
            "> ACCESS GRANTED.",
            "> Welcome to the NEON NEXUS, Operative."
        ];

        const textContainer = document.getElementById('typewriter-text');
        let lineIndex = 0;
        let charIndex = 0;

        function typeWriter() {
            if (lineIndex < terminalText.length) {
                if (charIndex < terminalText[lineIndex].length) {
                    textContainer.innerHTML += terminalText[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, Math.random() * 50 + 20); // 随机打字速度
                } else {
                    textContainer.innerHTML += '<br>';
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 400); // 换行停顿
                }
            }
        }

        // 页面加载完成后启动打字机效果
        window.onload = () => {
            setTimeout(typeWriter, 1000);
        };

        // 按钮点击效果
        function triggerAction() {
            const btn = document.querySelector('.cyber-btn');
            btn.innerText = "UPLOADING...";
            btn.style.backgroundColor = "#ff003c";
            btn.style.color = "#050505";
            btn.style.borderColor = "#ff003c";
            btn.style.boxShadow = "0 0 20px #ff003c inset, 0 0 30px #ff003c";
            
            textContainer.innerHTML += "<br><span style='color: #ff003c;'>> WARNING: UNAUTHORIZED DATA TRANSFER DETECTED...</span>";
            
            setTimeout(() => {
                btn.innerText = "INITIALIZE PROTOCOL";
                btn.style = ""; // 恢复默认 CSS 样式
            }, 3000);
        }
    </script>
</body>
</html>
